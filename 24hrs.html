<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>24 Hours Plan</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
  color:#e2e8f0;
}

.container{
  padding:22px;
  max-width:500px;
  margin:auto;
}

h2{
  font-weight:400;
  margin-bottom:18px;
}

.plan{
  padding:18px 0;
  border-bottom:1px solid rgba(255,255,255,0.06);
}

.plan h3{color:#38bdf8;font-size:18px;}

.plan p{
  font-size:13px;
  margin:2px 0;
}

.amount-days{color:#facc15;}
.amount-percent{color:#22c55e;}
.amount-payout{color:#a78bfa;}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:30px;
  margin-top:12px;
  background:linear-gradient(45deg,#38bdf8,#6366f1);
  color:#fff;
  cursor:pointer;
}

.claim-btn{
  background:linear-gradient(45deg,#22c55e,#16a34a);
}

.toast{
  position:fixed;
  top:20px;
  right:-400px;
  transition:0.4s;
}

.toast.show{right:20px;}
.toast.success{color:#4ade80;}
.toast.warning{color:#f87171;}
.toast.info{color:#60a5fa;}
</style>
</head>

<body>

<div class="container">
<h2>24 Hours Investment Plan</h2>
<div id="plans"></div>
</div>

<div id="toast" class="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
import { getDatabase, ref, onValue, get, update, set } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";

/* CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCc637WbfRNZ8-0CN4sEqEnGY27-oAdGiw",
  authDomain: "betpawa-6ef7e.firebaseapp.com",
  databaseURL: "https://betpawa-6ef7e-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "betpawa-6ef7e"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

/* ✅ ALL 40% */
const plans = [
  {amount:300000, percent:40},
  {amount:600000, percent:40},
  {amount:1000000, percent:40},
  {amount:2500000, percent:40},
  {amount:5000000, percent:40}
];

const DAY_MS = 86400000;

let investments = {};
let currentUser = null;

const toast=document.getElementById("toast");

/* FORMAT */
function formatMoney(num){
  return Number(num).toLocaleString();
}

/* TOAST */
function showToast(type,msg){
  toast.className="toast "+type;
  toast.innerText=msg;
  toast.classList.add("show");
  setTimeout(()=>toast.classList.remove("show"),2500);
}

/* TIMER */
function format(ms){
  if(ms<=0) return "Ready to claim";
  let s=Math.floor(ms/1000);
  return `${Math.floor(s/3600)}h ${Math.floor((s%3600)/60)}m ${s%60}s`;
}

/* INVEST */
async function invest(amount){
  if(!currentUser) return showToast("warning","Login first");

  const uid=currentUser.uid;
  const plan = plans.find(p=>p.amount===amount);

  const userRef = ref(db,"users/"+uid);
  const investRef = ref(db,`investments/${uid}/24hrs/${amount}`);

  const user = (await get(userRef)).val();

  if(!user || (user.balance||0) < amount){
    return showToast("warning","Insufficient balance");
  }

  const exist = await get(investRef);
  if(exist.exists()){
    return showToast("info","Already invested");
  }

  const percent = plan.percent/100;

  const profit = amount * percent;
  const totalReturn = amount + profit;

  await update(userRef,{
    balance:(user.balance||0)-amount,
    lockedBalance:(user.lockedBalance||0)+totalReturn
  });

  await set(investRef,{
    amount,
    percent: plan.percent,
    profit,
    totalReturn,
    startTime: Date.now(),
    completed:false
  });

  showToast("success","Investment started");
}

/* CLAIM */
async function claim(amount){
  if(!currentUser) return;

  const uid=currentUser.uid;

  const investRef = ref(db,`investments/${uid}/24hrs/${amount}`);
  const userRef = ref(db,"users/"+uid);

  const inv = (await get(investRef)).val();
  if(!inv) return;

  if(Date.now() < inv.startTime + DAY_MS){
    return showToast("info","Not yet time");
  }

  if(inv.completed){
    return showToast("info","Already claimed");
  }

  await update(investRef,{
    completed:true
  });

  const user = (await get(userRef)).val();

  await update(userRef,{
    balance:(user.balance||0)+inv.totalReturn,
    lockedBalance:(user.lockedBalance||0)-inv.totalReturn
  });

  showToast("success","Full payout received");
}

/* UI */
function render(){
  const box=document.getElementById("plans");
  box.innerHTML="";

  plans.forEach(p=>{
    let inv=investments[p.amount];
    let div=document.createElement("div");
    div.className="plan";

    if(inv){
      let time=(inv.startTime+DAY_MS)-Date.now();

      div.innerHTML=`
        <h3>${formatMoney(inv.amount)} UGX</h3>
        <p>Profit: <span class="amount-percent">${formatMoney(inv.profit)} UGX</span></p>
        <p>Total Return: <span class="amount-payout">${formatMoney(inv.totalReturn)} UGX</span></p>
        <p>Status: ${inv.completed ? "Completed" : format(time)}</p>
      `;

      let btn=document.createElement("button");
      btn.className="claim-btn";
      btn.innerText="Receive Full Payout";

      if(time<=0 && !inv.completed) btn.onclick=()=>claim(p.amount);
      else btn.style.opacity="0.5";

      div.appendChild(btn);

    }else{
      let profit = p.amount*(p.percent/100);
      let totalReturn = p.amount + profit;

      div.innerHTML=`
        <h3>${formatMoney(p.amount)} UGX</h3>
        <p>Duration: <span class="amount-days">24 Hours</span></p>
        <p>Profit: <span class="amount-percent">${p.percent}% (${formatMoney(profit)} UGX)</span></p>
        <p>Total Return: <span class="amount-payout">${formatMoney(totalReturn)} UGX</span></p>
      `;

      let btn=document.createElement("button");
      btn.innerText="Invest Now";
      btn.onclick=()=>invest(p.amount);

      div.appendChild(btn);
    }

    box.appendChild(div);
  });
}

/* REALTIME */
onAuthStateChanged(auth,u=>{
  currentUser=u;

  if(u){
    onValue(ref(db,"investments/"+u.uid+"/24hrs"),snap=>{
      let raw=snap.val()||{};
      investments={};

      Object.values(raw).forEach(v=>{
        investments[v.amount]=v;
      });

      render();
    });
  }else{
    render();
  }
});

setInterval(render,1000);
</script>

</body>
</html>
