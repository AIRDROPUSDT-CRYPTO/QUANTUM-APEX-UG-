<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register | Nexora</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
  background:linear-gradient(135deg,#020617,#0f172a); /* DARK FIX */
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

/* HEADER FIXED */
.header{
  position:fixed;
  top:20px;
  width:100%;
  text-align:center;
  color:#e2e8f0;
}

/* CARD */
.container{
  width:340px;
  padding:25px;
  border-radius:16px;
  background:#0f172a;
  position:relative;
  box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

/* GLOW BORDER */
.container::before{
  content:"";
  position:absolute;
  inset:0;
  padding:1px;
  border-radius:16px;
  background:linear-gradient(135deg,#2563eb,#7c3aed,#22c55e);
  -webkit-mask:
    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;

  pointer-events: none; /* 🔥 THIS FIXES EVERYTHING */
}

/* TEXT */
h2{font-size:18px;margin-bottom:10px;color:#f1f5f9;}

input, select{
  width:100%;
  padding:11px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #1e293b;
  font-size:14px;
  outline:none;
  background:#020617;
  color:#e2e8f0;
}

input:focus, select:focus{
  border-color:#2563eb;
  box-shadow:0 0 0 2px rgba(37,99,235,0.2);
}

/* PHONE BOX */
.phone-box{
  display:flex;
  gap:5px;
}

.phone-box select{width:40%;}
.phone-box input{width:60%;}

/* BUTTONS */
.register-btn{
  width:100%;
  padding:12px;
  margin-top:12px;
  border:none;
  border-radius:8px;
  background:linear-gradient(135deg,#2563eb,#4f46e5);
  color:#fff;
  cursor:pointer;
}

.login-btn{
  width:100%;
  padding:11px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  background:#1e293b;
  color:#e2e8f0;
}

/* FOOTER */
.footer{
  text-align:center;
  margin-top:12px;
  font-size:11px;
  color:#64748b;
}

/* LOADER */
.loader-overlay{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.6);
}

.loader{
  width:35px;height:35px;
  border:4px solid #2563eb;
  border-top:4px solid transparent;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{to{transform:rotate(360deg);}}

/* POPUP */
.popup{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0.9);
  background:#0f172a;
  color:#e2e8f0;
  padding:15px 20px;
  border-radius:10px;
  opacity:0;
  transition:0.2s;
}

.popup.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
.popup.success{border-left:4px solid #22c55e;}
.popup.error{border-left:4px solid #ef4444;}
</style>
</head>

<body>

<div class="header">
  <h3>Nexora Capital</h3>
</div>

<div class="container">

<h2>Create Account</h2>

<input type="text" id="name" placeholder="Full Name">
<input type="text" id="username" placeholder="Username">

<div class="phone-box">
  <select id="country">
    <option value="+254">🇰🇪 +254</option>
    <option value="+256">🇺🇬 +256</option>
    <option value="+255">🇹🇿 +255</option>
    <option value="+234">🇳🇬 +234</option>
    <option value="+233">🇬🇭 +233</option>
  </select>
  <input type="text" id="phone" placeholder="7XXXXXXXX">
</div>

<input type="email" id="email" placeholder="Email Address">
<input type="password" id="password" placeholder="Password">
<input type="password" id="confirmPassword" placeholder="Confirm Password">
<input type="text" id="refCode" placeholder="Referral Code">

<button class="register-btn" onclick="register()">Create Account</button>
<button class="login-btn" onclick="location.href='login.html'">Login</button>

<div class="footer">© Nexora Capital</div>
</div>

<div class="loader-overlay" id="loader"><div class="loader"></div></div>
<div id="popup" class="popup"><p id="popupMsg"></p></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCc637WbfRNZ8-0CN4sEqEnGY27-oAdGiw",
  authDomain: "betpawa-6ef7e.firebaseapp.com",
  databaseURL: "https://betpawa-6ef7e-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "betpawa-6ef7e",
  storageBucket: "betpawa-6ef7e.appspot.com",
  messagingSenderId: "908050081607",
  appId: "1:908050081607:web:db6e861fca63df78584e62"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

function showPopup(msg,type){
  const popup=document.getElementById("popup");
  popup.className="popup show "+type;
  document.getElementById("popupMsg").innerText=msg;
  setTimeout(()=>popup.classList.remove("show"),2000);
}

function formatPhone(){
  let num = document.getElementById("phone").value.replace(/\D/g,"");
  let code = document.getElementById("country").value;

  if(num.startsWith("0")) num = num.slice(1);

  document.getElementById("phone").value = num;
  return code + num;
}

async function generateUniqueCode(){
  let code, exists=true;
  while(exists){
    code=Math.random().toString(36).substring(2,8).toUpperCase();
    const snap=await get(ref(db,"public/refCodes/"+code));
    exists=snap.exists();
  }
  return code;
}

window.register = async function(){

  const loader=document.getElementById("loader");
  loader.style.display="flex";

  try{
    const nameVal=document.getElementById("name").value.trim();
    const userVal=document.getElementById("username").value.trim();
    const phoneVal=formatPhone();
    const emailVal=document.getElementById("email").value.trim();
    const pass=document.getElementById("password").value;
    const confirm=document.getElementById("confirmPassword").value;
    const refVal=document.getElementById("refCode").value.trim().toUpperCase();

    if(!nameVal||!userVal||!emailVal||!pass) throw {msg:"Fill all fields"};
    if(pass!==confirm) throw {msg:"Passwords mismatch"};

    const refSnap=await get(ref(db,"public/refCodes/"+refVal));
    if(!refSnap.exists()) throw {msg:"Invalid referral"};

    const usersSnap=await get(ref(db,"users"));
    if(usersSnap.exists()){
      const users=usersSnap.val();
      for(let uid in users){
        if(users[uid].username===userVal){
          throw {msg:"Username taken"};
        }
      }
    }

    const cred=await createUserWithEmailAndPassword(auth,emailVal,pass);
    const user=cred.user;

    const newCode=await generateUniqueCode();

    await set(ref(db,"users/"+user.uid),{
      name:nameVal,
      username:userVal,
      phone:phoneVal,
      email:emailVal,
      referredBy:refVal,
      refCode:newCode,
      balance:0,
      createdAt:Date.now()
    });

    await set(ref(db,"public/refCodes/"+newCode),user.uid);

    showPopup("Account created","success");
    setTimeout(()=>location.href="dashboard.html",1200);

  }catch(err){
    showPopup(err.msg||err.message,"error");
  }

  loader.style.display="none";
}
</script>

</body>
  </html>
