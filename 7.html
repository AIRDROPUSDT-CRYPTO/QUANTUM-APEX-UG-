<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7 Days Plan</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
  color:#e2e8f0;
}

.container{
  padding:22px;
  max-width:500px;
  margin:auto;
}

h2{
  font-weight:400;
  margin-bottom:18px;
}

.plan{
  padding:18px 0;
  border-bottom:1px solid rgba(255,255,255,0.06);
}

.plan h3{color:#38bdf8;font-size:18px;}

.plan p{
  font-size:13px;
  margin:2px 0;
}

.amount-days{color:#facc15;}
.amount-percent{color:#22c55e;}
.amount-payout{color:#a78bfa;}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:30px;
  margin-top:12px;
  background:linear-gradient(45deg,#38bdf8,#6366f1);
  color:#fff;
  cursor:pointer;
}

.claim-btn{
  background:linear-gradient(45deg,#22c55e,#16a34a);
}

.toast{
  position:fixed;
  top:20px;
  right:-400px;
  transition:0.4s;
}

.toast.show{right:20px;}
.toast.success{color:#4ade80;}
.toast.warning{color:#f87171;}
.toast.info{color:#60a5fa;}
</style>
</head>

<body>

<div class="container">
<h2>7 Days Investment Plan</h2>
<div id="plans"></div>
</div>

<div id="toast" class="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
import { getDatabase, ref, onValue, get, update, set } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCc637WbfRNZ8-0CN4sEqEnGY27-oAdGiw",
  authDomain: "betpawa-6ef7e.firebaseapp.com",
  databaseURL: "https://betpawa-6ef7e-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "betpawa-6ef7e",
  storageBucket: "betpawa-6ef7e.firebasestorage.app",
  messagingSenderId: "908050081607",
  appId: "1:908050081607:web:db6e861fca63df78584e62",
  measurementId: "G-C7M7HWTD01"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

const plans = [
  {amount:500000, percent:15},
  {amount:1000000, percent:25},
  {amount:5000000, percent:40}
];

const DAYS = 7;
const DAY_MS = 86400000;

let investments = {};
let currentUser = null;

const toast=document.getElementById("toast");

function formatUGX(num){
  return Math.floor(num).toLocaleString() + " UGX";
}

function showToast(type,msg){
  toast.className="toast "+type;
  toast.innerText=msg;
  toast.classList.add("show");
  setTimeout(()=>toast.classList.remove("show"),2500);
}

function format(ms){
  if(ms<=0) return "Ready to claim";
  let s=Math.floor(ms/1000);
  return `${Math.floor(s/3600)}h ${Math.floor((s%3600)/60)}m ${s%60}s`;
}

/* INVEST */
async function invest(amount){
  if(!currentUser) return showToast("warning","Login first");

  const uid=currentUser.uid;
  const percent = plans.find(p=>p.amount===amount).percent/100;

  const userRef = ref(db,"users/"+uid);
  const investRef = ref(db,`investments/${uid}/7days/${amount}`);

  const user = (await get(userRef)).val();

  if(!user || (user.balance||0) < amount){
    return showToast("warning","Insufficient balance");
  }

  if((await get(investRef)).exists()){
    return showToast("info","Already invested");
  }

  const daily = amount * percent;
  const total = amount + (daily * DAYS);

  await update(userRef,{
    balance:(user.balance||0)-amount,
    lockedBalance:(user.lockedBalance||0)+total
  });

  await set(investRef,{
    amount,
    daily,
    total,
    remaining:total,
    startTime:Date.now(),
    lastClaim:0,
    daysClaimed:0,
    completed:false
  });

  showToast("success","Investment started");
}

/* CLAIM */
async function claim(amount){
  if(!currentUser) return;

  const uid=currentUser.uid;

  const investRef = ref(db,`investments/${uid}/7days/${amount}`);
  const userRef = ref(db,"users/"+uid);

  const inv = (await get(investRef)).val();
  if(!inv) return;

  const last = inv.lastClaim||inv.startTime;

  if(Date.now() < last + DAY_MS){
    return showToast("info","Not yet time");
  }

  if(inv.completed){
    return showToast("info","Completed");
  }

  let payout = inv.daily;

  if(inv.daysClaimed + 1 === DAYS){
    payout += inv.amount;
  }

  await update(investRef,{
    lastClaim:Date.now(),
    daysClaimed:inv.daysClaimed+1,
    remaining:inv.remaining-payout,
    completed:(inv.daysClaimed+1)>=DAYS
  });

  const user = (await get(userRef)).val();

  await update(userRef,{
    balance:(user.balance||0)+payout,
    lockedBalance:(user.lockedBalance||0)-payout
  });

  showToast("success","Received " + formatUGX(payout));
}

/* UI FIXED */
function render(){
  const box=document.getElementById("plans");
  box.innerHTML="";

  plans.forEach(p=>{
    let inv=investments[p.amount];
    let div=document.createElement("div");
    div.className="plan";

    if(inv){
      let last=inv.lastClaim||inv.startTime;
      let time=(last+DAY_MS)-Date.now();

      /* ✅ RECALCULATE TOTAL (FIX) */
      const correctTotal = inv.amount + (inv.daily * DAYS);

      div.innerHTML=`
        <h3>${formatUGX(inv.amount)}</h3>
        <p>Days Remaining: <span class="amount-days">${DAYS-inv.daysClaimed}</span></p>
        <p>Daily Profit: <span class="amount-percent">${formatUGX(inv.daily)}</span></p>
        <p>Total Payout: <span class="amount-payout">${formatUGX(correctTotal)}</span></p>
        <p>${format(time)}</p>
      `;

      let btn=document.createElement("button");
      btn.className="claim-btn";
      btn.innerText="Receive Daily Earnings";

      if(time<=0) btn.onclick=()=>claim(p.amount);
      else btn.style.opacity="0.5";

      div.appendChild(btn);

    }else{

      const daily = p.amount * (p.percent/100);
      const total = p.amount + (daily * DAYS);

      div.innerHTML=`
        <h3>${formatUGX(p.amount)}</h3>
        <p>Duration: <span class="amount-days">${DAYS} Days</span></p>
        <p>Daily Profit: <span class="amount-percent">${formatUGX(daily)}</span></p>
        <p>Total Payout: <span class="amount-payout">${formatUGX(total)}</span></p>
      `;

      let btn=document.createElement("button");
      btn.innerText="Invest Now";
      btn.onclick=()=>invest(p.amount);

      div.appendChild(btn);
    }

    box.appendChild(div);
  });
}

onAuthStateChanged(auth,u=>{
  currentUser=u;

  if(u){
    onValue(ref(db,"investments/"+u.uid+"/7days"),snap=>{
      let raw=snap.val()||{};
      investments={};

      Object.values(raw).forEach(v=>{
        investments[v.amount]=v;
      });

      render();
    });
  }else{
    render();
  }
});

setInterval(render,1000);
</script>

</body>
</html>
