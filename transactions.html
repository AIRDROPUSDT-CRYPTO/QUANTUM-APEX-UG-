<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transactions | Quantum Apex Ug</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:linear-gradient(135deg,#020617,#020617,#0f172a);
  color:#fff;
}

.topbar{
  padding:15px;
  text-align:center;
  font-weight:600;
  background:rgba(15,23,42,0.7);
  backdrop-filter:blur(10px);
}

.container{
  padding:20px;
}

.card{
  background:linear-gradient(135deg,#0f172a,#1e293b);
  padding:16px;
  border-radius:16px;
  margin-bottom:14px;
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
  display:flex;
  justify-content:space-between;
  animation:fadeIn 0.4s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

.left{
  display:flex;
  gap:12px;
}

.icon{
  width:40px;
  height:40px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}

.deposit-icon{
  background:rgba(34,197,94,0.15);
  color:#22c55e;
}

.withdraw-icon{
  background:rgba(56,189,248,0.15);
  color:#38bdf8;
}

.title{
  font-weight:600;
}

.date{
  font-size:12px;
  color:#94a3b8;
}

.txid{
  font-size:11px;
  color:#64748b;
  margin-top:4px;
  display:flex;
  align-items:center;
  gap:6px;
}

.copy-btn{
  font-size:10px;
  padding:2px 6px;
  border-radius:6px;
  background:#1e293b;
  cursor:pointer;
}

.right{
  text-align:right;
}

.amount{
  font-weight:600;
  white-space:nowrap; /* 🔥 prevent breaking */
}

.status{
  font-size:11px;
  margin-top:4px;
  padding:3px 8px;
  border-radius:10px;
  background:rgba(34,197,94,0.15);
  color:#22c55e;
}

.popup{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0.8);
  background:#020617;
  padding:18px 25px;
  border-radius:12px;
  opacity:0;
  transition:0.3s;
  z-index:1000;
}

.popup.show{
  opacity:1;
  transform:translate(-50%,-50%) scale(1);
}

.popup.success{
  border:2px solid #22c55e;
}

.empty{
  text-align:center;
  margin-top:60px;
  color:#64748b;
}
</style>
</head>

<body>

<div class="topbar">Transaction History</div>

<div class="container" id="historyContainer">
  <div class="empty">No transactions yet</div>
</div>

<div id="popup" class="popup"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";

/* ✅ FULL CONFIG (MATCH DASHBOARD) */
const firebaseConfig = {
  apiKey: "AIzaSyCc637WbfRNZ8-0CN4sEqEnGY27-oAdGiw",
  authDomain: "betpawa-6ef7e.firebaseapp.com",
  databaseURL: "https://betpawa-6ef7e-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "betpawa-6ef7e",
  storageBucket: "betpawa-6ef7e.firebasestorage.app",
  messagingSenderId: "908050081607",
  appId: "1:908050081607:web:db6e861fca63df78584e62",
  measurementId: "G-C7M7HWTD01"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

const container = document.getElementById("historyContainer");

/* FORMAT */
const formatDate = t => new Date(t).toLocaleString();
const formatMoney = a => Number(a).toLocaleString() + " UGX";

/* SHORT ID */
function shortId(id){
  return "TX-" + id.slice(-6).toUpperCase();
}

/* COPY */
window.copyId = function(id){
  navigator.clipboard.writeText(id);
  showPopup("Transaction ID copied");
}

/* POPUP */
function showPopup(msg){
  const p = document.getElementById("popup");
  p.innerText = msg;
  p.className = "popup show success";
  setTimeout(()=>p.classList.remove("show"),2000);
}

/* TRACK SHOWN */
let shown = new Set();

/* STORE DATA */
let deposits = [];
let withdrawals = [];

/* RENDER */
function render(){
  let all = [...deposits, ...withdrawals];

  container.innerHTML = "";

  if(all.length === 0){
    container.innerHTML = '<div class="empty">No transactions yet</div>';
    return;
  }

  all.sort((a,b)=>b.createdAt - a.createdAt);

  all.forEach(tx=>{
    let div = document.createElement("div");
    div.className = "card";

    let id = shortId(tx.id);

    if(!shown.has(tx.id)){
      shown.add(tx.id);
      showPopup(tx.type === "deposit" ? "Deposit approved" : "Withdrawal successful");
    }

    div.innerHTML = `
      <div class="left">
        <div class="icon ${tx.type === 'deposit' ? 'deposit-icon':'withdraw-icon'}">
          ${tx.type === 'deposit' ? '⬇':'⬆'}
        </div>

        <div>
          <div class="title">${tx.type === 'deposit' ? 'Deposit':'Withdrawal'}</div>
          <div class="date">${formatDate(tx.createdAt)}</div>

          <div class="txid">
            ${id}
            <span class="copy-btn" onclick="copyId('${id}')">Copy</span>
          </div>
        </div>
      </div>

      <div class="right">
        <div class="amount">${formatMoney(tx.amount)}</div>
        <div class="status">Completed</div>
      </div>
    `;

    container.appendChild(div);
  });
}

/* AUTH */
onAuthStateChanged(auth,user=>{
  if(!user){
    location.href="login.html";
    return;
  }

  /* ✅ ONLY SUCCESSFUL DEPOSITS */
  onValue(ref(db,"deposits"),snap=>{
    deposits = [];

    snap.forEach(c=>{
      let d = c.val();
      if(d.userId===user.uid && d.status==="success"){
        deposits.push({...d,type:"deposit",id:c.key});
      }
    });

    render();
  });

  /* ✅ ONLY SUCCESSFUL WITHDRAWALS */
  onValue(ref(db,"withdrawals"),snap=>{
    withdrawals = [];

    snap.forEach(c=>{
      let d = c.val();
      if(d.userId===user.uid && d.status==="success"){
        withdrawals.push({...d,type:"withdraw",id:c.key});
      }
    });

    render();
  });
});
</script>

</body>
  </html>
