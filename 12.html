<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>12 Days Plan</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
  color:#fff;
}

.container{padding:20px;}

.plan{
  background:linear-gradient(135deg,#1e293b,#020617);
  padding:18px;
  border-radius:16px;
  margin-bottom:15px;
  box-shadow:0 0 20px rgba(0,0,0,0.3);
  transition:0.3s;
}

.plan:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.plan h3{
  color:#38bdf8;
  font-size:22px;
}

.plan p{
  font-size:13px;
  color:#94a3b8;
  margin:4px 0;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:30px;
  margin-top:12px;
  background:linear-gradient(45deg,#38bdf8,#6366f1);
  color:#fff;
  cursor:pointer;
  font-weight:600;
}

.claim-btn{
  background:linear-gradient(45deg,#22c55e,#16a34a);
}

.disabled{
  opacity:0.4;
  pointer-events:none;
}

/* POPUP */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(6px);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:0.3s;
  z-index:999;
}

.overlay.show{
  opacity:1;
  pointer-events:auto;
}

.popup{
  width:300px;
  background:linear-gradient(135deg,#0f172a,#020617);
  border-radius:18px;
  padding:22px;
  text-align:center;
}

.popup.success{border:1px solid #22c55e;}
.popup.error{border:1px solid #ef4444;}
.popup.info{border:1px solid #38bdf8;}

.popup button{
  margin-top:14px;
  background:#22c55e;
}
</style>
</head>

<body>

<div class="container">
<h2>12 Days Investment Plan</h2>
<div id="plans"></div>
</div>

<!-- POPUP -->
<div id="overlay" class="overlay">
  <div id="popup" class="popup">
    <h3 id="popTitle"></h3>
    <p id="popMsg"></p>
    <button id="popBtn" style="display:none;"></button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
import { getDatabase, ref, onValue, runTransaction, set } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyCc637WbfRNZ8-0CN4sEqEnGY27-oAdGiw",
  authDomain: "betpawa-6ef7e.firebaseapp.com",
  databaseURL: "https://betpawa-6ef7e-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "betpawa-6ef7e",
  storageBucket: "betpawa-6ef7e.firebasestorage.app",
  messagingSenderId: "908050081607",
  appId: "1:908050081607:web:db6e861fca63df78584e62"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

/* CONFIG */
const plans = [150000,500000,1000000,5000000];
const DAILY_PERCENT = 0.0917;
const DAYS = 12;

let uid=null;
let investments = {};
let userData = {};

/* POPUP */
const overlay=document.getElementById("overlay");
const popup=document.getElementById("popup");
const popTitle=document.getElementById("popTitle");
const popMsg=document.getElementById("popMsg");
const popBtn=document.getElementById("popBtn");

function showPopup(title,msg,type="info",btnText=null,action=null){
  popTitle.innerText=title;
  popMsg.innerText=msg;
  popup.className="popup "+type;
  overlay.classList.add("show");

  if(btnText){
    popBtn.style.display="block";
    popBtn.innerText=btnText;
    popBtn.onclick=action;
  }else{
    popBtn.style.display="none";
    setTimeout(()=>overlay.classList.remove("show"),2000);
  }
}

overlay.onclick=(e)=>{
  if(e.target===overlay) overlay.classList.remove("show");
};

/* TIME */
function formatTime(ms){
  if(ms<=0) return "Ready to claim";
  let t=Math.floor(ms/1000);
  let h=Math.floor(t/3600);
  let m=Math.floor((t%3600)/60);
  let s=t%60;
  return `${h}h ${m}m ${s}s`;
}

/* RENDER */
function render(){
  const container=document.getElementById("plans");
  container.innerHTML="";

  plans.forEach(amount=>{

    let active = investments[amount] || null;

    let div=document.createElement("div");
    div.className="plan";

    if(active){

      let lastTime = active.lastClaim===0 ? active.startTime : active.lastClaim;
      let remaining = (lastTime + 86400000) - Date.now();
      let canClaim = remaining <= 0;

      div.innerHTML=`
        <h3>${amount.toLocaleString()} UGX</h3>
        <p>Daily: ${Math.floor(active.daily)} UGX</p>
        <p>Progress: ${active.daysClaimed}/${DAYS}</p>
        <p>${active.completed ? "Completed" : formatTime(remaining)}</p>
      `;

      let btn=document.createElement("button");
      btn.className="claim-btn";

      if(active.completed){
        btn.innerText="Completed";
        btn.classList.add("disabled");
      }
      else if(canClaim){
        btn.innerText="Receive Today's Earnings";
        btn.onclick=()=>claim(amount);
      }
      else{
        btn.innerText="Locked";
        btn.classList.add("disabled");
      }

      div.appendChild(btn);

    }else{

      div.innerHTML=`
        <h3>${amount.toLocaleString()} UGX</h3>
        <p>Duration: 12 Days</p>
        <p>Daily Profit: 9.17%</p>
      `;

      let btn=document.createElement("button");
      btn.innerText="Invest Now";
      btn.onclick=()=>invest(amount);

      div.appendChild(btn);
    }

    container.appendChild(div);
  });
}

setInterval(render,1000);

/* INVEST */
async function invest(amount){

  const path="investments/"+uid+"/12days/"+amount;

  let created=false;

  await runTransaction(ref(db,path),data=>{
    if(data) return;
    created=true;
    return {
      amount,
      daily:amount*DAILY_PERCENT,
      total:amount*DAILY_PERCENT*DAYS,
      remaining:amount*DAILY_PERCENT*DAYS,
      lastClaim:0,
      startTime:Date.now(),
      daysClaimed:0,
      completed:false
    };
  });

  if(!created){
    showPopup("Active Plan","Already invested in this plan","info");
    return;
  }

  let success=false;

  await runTransaction(ref(db,"users/"+uid),user=>{
    if(user){
      if((user.balance||0) < amount) return;
      user.balance -= amount;
      user.lockedBalance = (user.lockedBalance||0)+(amount*DAILY_PERCENT*DAYS);
      success=true;
    }
    return user;
  });

  if(!success){
    await set(ref(db,path),null);
    showPopup("Insufficient Balance","Please deposit funds","error");
    return;
  }

  showPopup("Success","Investment started","success");
}

/* CLAIM */
async function claim(amount){

  const investRef=ref(db,"investments/"+uid+"/12days/"+amount);

  let payout=0;
  let allowed=false;

  await runTransaction(investRef,data=>{
    if(data){
      let lastTime=data.lastClaim===0 ? data.startTime : data.lastClaim;

      if(Date.now() >= lastTime + 86400000){
        payout=Math.floor(data.daily);
        data.lastClaim=Date.now();
        data.daysClaimed++;
        data.remaining-=payout;
        data.completed=data.daysClaimed>=DAYS;
        allowed=true;
      }
    }
    return data;
  });

  if(!allowed){
    showPopup("Wait","Come back after 24 hours","info");
    return;
  }

  await runTransaction(ref(db,"users/"+uid),user=>{
    if(user){
      user.balance=(user.balance||0)+payout;
      user.lockedBalance=(user.lockedBalance||0)-payout;
    }
    return user;
  });

  showPopup("Success","Earnings received","success");
}

/* REALTIME */
onAuthStateChanged(auth,user=>{
  if(user){
    uid=user.uid;

    onValue(ref(db,"users/"+uid),snap=>{
      userData=snap.val()||{};
    });

    onValue(ref(db,"investments/"+uid+"/12days"),snap=>{
      let raw=snap.val()||{};
      investments={};

      Object.keys(raw).forEach(k=>{
        let item=raw[k];
        if(item && item.amount){
          investments[item.amount]=item;
        }
      });

      render();
    });
  }
});
</script>

</body>
</html>
