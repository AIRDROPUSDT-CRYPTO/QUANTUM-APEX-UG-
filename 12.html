<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>12 Days Plan</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
  color:#fff;
}

.container{padding:20px;}

.plan{
  background:linear-gradient(135deg,#0f172a,#020617);
  padding:18px;
  border-radius:18px;
  margin-bottom:15px;
  box-shadow:
    0 0 0 1px rgba(56,189,248,0.1),
    0 0 25px rgba(56,189,248,0.15),
    inset 0 0 20px rgba(255,255,255,0.02);
  position:relative;
  overflow:hidden;
}

.plan::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:18px;
  padding:1px;
  background:linear-gradient(120deg,#38bdf8,#6366f1,#22c55e);
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;
  opacity:0.3;
  pointer-events:none;
}

.plan h3{color:#38bdf8;font-size:22px;}

.amount-days{color:#facc15;font-weight:700;}
.amount-percent{color:#22c55e;font-weight:700;}
.amount-payout{color:#a78bfa;font-weight:700;}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:30px;
  margin-top:12px;
  background:linear-gradient(45deg,#38bdf8,#6366f1);
  color:#fff;
  cursor:pointer;
  font-weight:600;
}

.claim-btn{
  background:linear-gradient(45deg,#22c55e,#16a34a);
}

.popup{
  width:300px;
  background:#020617;
  border-radius:18px;
  padding:20px;
  text-align:center;
  border:1px solid rgba(255,255,255,0.08);
}

.popup.success{border-color:#22c55e;}
.popup.success h3{color:#22c55e;}

.popup.warning{border-color:#facc15;}
.popup.warning h3{color:#facc15;}

.popup.info{border-color:#38bdf8;}
.popup.info h3{color:#38bdf8;}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:0.3s;
}

.overlay.show{opacity:1;pointer-events:auto;}
</style>
</head>

<body>

<div class="container">
<h2>12 Days Investment Plan</h2>
<div id="plans"></div>
</div>

<div id="overlay" class="overlay">
  <div id="popupBox" class="popup">
    <h3 id="popTitle"></h3>
    <p id="popMsg"></p>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
import { getDatabase, ref, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCc637WbfRNZ8-0CN4sEqEnGY27-oAdGiw",
  authDomain: "betpawa-6ef7e.firebaseapp.com",
  databaseURL: "https://betpawa-6ef7e-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "betpawa-6ef7e",
  storageBucket: "betpawa-6ef7e.firebasestorage.app",
  messagingSenderId: "908050081607",
  appId: "1:908050081607:web:db6e861fca63df78584e62",
  measurementId: "G-C7M7HWTD01"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

const plans=[150000,500000,1000000,5000000];
const DAILY_PERCENT=0.0917;
const DAYS=12;

let user=null;
let investments={};
let userData=null;

const overlay=document.getElementById("overlay");
const popupBox=document.getElementById("popupBox");
const popTitle=document.getElementById("popTitle");
const popMsg=document.getElementById("popMsg");

function showPopup(type,title,msg){
  popupBox.className="popup "+type;
  popTitle.innerText=title;
  popMsg.innerText=msg;
  overlay.classList.add("show");
  setTimeout(()=>overlay.classList.remove("show"),2200);
}

function format(ms){
  if(ms<=0) return "Ready to claim";
  let s=Math.floor(ms/1000);
  return `${Math.floor(s/3600)}h ${Math.floor((s%3600)/60)}m ${s%60}s`;
}

function render(){
  const box=document.getElementById("plans");
  box.innerHTML="";

  plans.forEach(amount=>{
    let inv=investments[amount];
    let div=document.createElement("div");
    div.className="plan";

    if(inv){
      let last=inv.lastClaim||inv.startTime;
      let time=(last+86400000)-Date.now();
      let can=time<=0;
      let daysLeft=DAYS-inv.daysClaimed;

      div.innerHTML=`
        <h3>${amount.toLocaleString()} UGX</h3>
        <p>Days Remaining: <span class="amount-days">${daysLeft}</span></p>
        <p>Daily Profit: <span class="amount-percent">${Math.floor(inv.daily)} UGX</span></p>
        <p>Expected Payout: <span class="amount-payout">${Math.floor(inv.total)} UGX</span></p>
        <p>${format(time)}</p>
      `;

      let btn=document.createElement("button");
      btn.className="claim-btn";
      btn.innerText="Receive Daily Earnings";

      if(can) btn.onclick=()=>claim(amount);
      else btn.style.opacity="0.5";

      div.appendChild(btn);

    }else{
      let total=amount*DAILY_PERCENT*DAYS;

      div.innerHTML=`
        <h3>${amount.toLocaleString()} UGX</h3>
        <p>Duration: <span class="amount-days">${DAYS} Days</span></p>
        <p>Daily Profit: <span class="amount-percent">${(DAILY_PERCENT*100).toFixed(2)}%</span></p>
        <p>Expected Payout: <span class="amount-payout">${Math.floor(total)} UGX</span></p>
      `;

      let btn=document.createElement("button");
      btn.innerText="Invest Now";
      btn.onclick=()=>invest(amount);

      div.appendChild(btn);
    }

    box.appendChild(div);
  });
}

/* ✅ FIXED INVEST (SAFE TRANSACTION) */
async function invest(amount){

  if(!user || !userData){
    return showPopup("info","Please wait","Loading account...");
  }

  const uid=user.uid;

  if((userData.balance||0) < amount){
    return showPopup("warning","Low Balance","Top up your account to continue");
  }

  const total=amount*DAILY_PERCENT*DAYS;

  await runTransaction(ref(db,"users/"+uid),(u)=>{
    if(!u) return u;

    if((u.balance||0) < amount){
      return; // abort safely
    }

    u.balance = (u.balance||0) - amount;

    /* KEEP YOUR LOGIC */
    u.withdrawableBalance = u.balance;

    u.lockedBalance = (u.lockedBalance||0) + total;

    return u;
  });

  await runTransaction(ref(db,"investments/"+uid+"/12days/"+amount),(d)=>{
    if(d) return d;
    return {
      amount,
      daily:amount*DAILY_PERCENT,
      total,
      remaining:total,
      startTime:Date.now(),
      lastClaim:0,
      daysClaimed:0,
      completed:false
    };
  });

  showPopup("success","Success","Investment started");
}

/* CLAIM */
async function claim(amount){
  const uid=user.uid;
  let pay=0,ok=false;

  await runTransaction(ref(db,"investments/"+uid+"/12days/"+amount),(d)=>{
    if(d){
      let last=d.lastClaim||d.startTime;
      if(Date.now()>=last+86400000){
        pay=Math.floor(d.daily);
        d.lastClaim=Date.now();
        d.daysClaimed++;
        d.remaining-=pay;
        d.completed=d.daysClaimed>=DAYS;
        ok=true;
      }
    }
    return d;
  });

  if(!ok) return showPopup("info","Please wait","Not yet time");

  await runTransaction(ref(db,"users/"+uid),(u)=>{
    if(!u) return u;

    u.balance = (u.balance||0) + pay;

    /* KEEP YOUR LOGIC */
    u.withdrawableBalance = u.balance;

    u.lockedBalance = (u.lockedBalance||0) - pay;

    return u;
  });

  showPopup("success","Success","Earnings received");
}

/* REALTIME */
onAuthStateChanged(auth,u=>{
  user=u;

  if(u){
    onValue(ref(db,"users/"+u.uid),snap=>{
      userData = snap.val() || {};
    });

    onValue(ref(db,"investments/"+u.uid+"/12days"),snap=>{
      let raw=snap.val()||{};
      investments={};
      Object.values(raw).forEach(v=>{
        investments[v.amount]=v;
      });
      render();
    });
  }else{
    render();
  }
});

setInterval(render,1000);
</script>

</body>
</html>
