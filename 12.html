<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>12 Days Plan</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
  color:#fff;
}

.container{padding:20px;}

.plan{
  background:linear-gradient(135deg,#1e293b,#020617);
  padding:18px;
  border-radius:14px;
  margin-bottom:15px;
}

.plan h3{color:#38bdf8;}
.plan p{font-size:13px;color:#94a3b8;margin:4px 0;}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:25px;
  margin-top:10px;
  background:linear-gradient(45deg,#38bdf8,#6366f1);
  color:#fff;
  cursor:pointer;
}

.claim-btn{background:#22c55e;}
.disabled{opacity:0.5;pointer-events:none;}

.popup{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0.9);
  padding:20px;
  border-radius:12px;
  text-align:center;
  width:280px;
  opacity:0;
  transition:0.3s;
  z-index:999;
  color:#fff;
}

.popup.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
.popup.success{ background:#065f46; }
.popup.error{ background:#7f1d1d; }
.popup.info{ background:#1e293b; }
</style>
</head>

<body>

<div class="container">
<h2>12 Days Investment Plan</h2>
<div id="plans"></div>
</div>

<div id="popup" class="popup">
  <h3 id="popTitle"></h3>
  <p id="popMsg"></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
import { getDatabase, ref, onValue, update, push, get } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";

/* ✅ FIX: DEFINE ELEMENT */
const plansDiv = document.getElementById("plans");

const firebaseConfig = {
  apiKey: "AIzaSyCc637WbfRNZ8-0CN4sEqEnGY27-oAdGiw",
  authDomain: "betpawa-6ef7e.firebaseapp.com",
  databaseURL: "https://betpawa-6ef7e-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "betpawa-6ef7e",
  storageBucket: "betpawa-6ef7e.firebasestorage.app",
  messagingSenderId: "908050081607",
  appId: "1:908050081607:web:db6e861fca63df78584e62",
  measurementId: "G-C7M7HWTD01"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

const plans = [150000,500000,1000000,5000000];
const DAILY_PERCENT = 0.0917;
const DAYS = 12;

let uid=null;
let notified = {};

/* POPUP */
function showPopup(t,m,type="info"){
  popTitle.innerText=t;
  popMsg.innerText=m;
  popup.className="popup show "+type;
  setTimeout(()=>popup.classList.remove("show"),2000);
}

/* TIME FORMAT */
function formatTime(ms){
  if(ms <= 0) return "0h 0m 0s";
  let total = Math.floor(ms/1000);
  let h = Math.floor(total/3600);
  let m = Math.floor((total%3600)/60);
  let s = total%60;
  return `${h}h ${m}m ${s}s`;
}

/* RENDER */
function renderPlans(investments={}){
  let html="";

  plans.forEach(amount=>{
    let active = Object.values(investments).find(i=>i.amount===amount);

    if(active){
      let finished = active.completed === true;

      let now = Date.now();
      let nextTime = active.lastClaim + 86400000;
      let remainingTime = nextTime - now;
      let canClaim = remainingTime <= 0;

      let earned = Math.floor(active.daily * active.daysClaimed);

      /* notify once */
      if(canClaim && !finished && !notified[active.id]){
        showPopup("Ready 🎉","You can now claim earnings","success");
        notified[active.id] = true;
      }

      if(!canClaim){
        notified[active.id] = false;
      }

      html+=`
      <div class="plan">
        <h3>${amount.toLocaleString()} UGX</h3>
        <p>Daily: ${Math.floor(active.daily)} UGX</p>
        <p>Progress: ${active.daysClaimed}/${DAYS}</p>
        <p>Total Earned: ${earned.toLocaleString()} UGX</p>
        <p>${finished ? "Completed" : (canClaim ? "Ready to claim" : "Next in: "+formatTime(remainingTime))}</p>

        <button class="claim-btn ${(!canClaim || finished) ? "disabled" : ""}" 
        onclick="claim('${active.id}')">
        ${finished ? "Completed" : "Receive"}
        </button>
      </div>`;
    }else{
      html+=`
      <div class="plan">
        <h3>${amount.toLocaleString()} UGX</h3>
        <p>Duration: 12 Days</p>
        <p>Daily Profit: 9.17%</p>
        <button onclick="invest(${amount})">Invest Now</button>
      </div>`;
    }
  });

  plansDiv.innerHTML=html;
}

/* LIVE TIMER (NO RESET) */
setInterval(async ()=>{
  if(uid){
    const snap = await get(ref(db,"investments/"+uid+"/12days"));
    let data = snap.val() || {};

    Object.keys(data).forEach(k=> data[k].id = k);

    renderPlans(data);
  }
},1000);

/* INVEST */
window.invest = async(amount)=>{
  const userRef = ref(db,"users/"+uid);
  const userSnap = await get(userRef);
  const user = userSnap.val();

  if((user.balance||0) < amount){
    showPopup("Error","Insufficient balance","error");
    return;
  }

  const daily = amount * DAILY_PERCENT;
  const total = daily * DAYS;

  const newRef = push(ref(db,"investments/"+uid+"/12days"));

  await update(userRef,{
    balance: user.balance - amount,
    lockedBalance: (user.lockedBalance||0) + total
  });

  await update(newRef,{
    id:newRef.key,
    amount,
    daily,
    total,
    remaining: total,
    lastClaim:0,
    daysClaimed:0,
    completed:false
  });

  showPopup("Success","Investment started","success");
};

/* CLAIM */
window.claim = async(id)=>{
  const investRef = ref(db,"investments/"+uid+"/12days/"+id);
  const userRef = ref(db,"users/"+uid);

  const snap = await get(investRef);
  const data = snap.val();

  if(!data) return;

  if(data.completed){
    showPopup("Done","Already completed");
    return;
  }

  if((Date.now()-data.lastClaim) < 86400000){
    showPopup("Wait","Come back after 24hrs");
    return;
  }

  let daily = Math.floor(data.daily);

  let newDays = data.daysClaimed + 1;
  let isDone = newDays >= DAYS;

  await update(investRef,{
    lastClaim:Date.now(),
    daysClaimed:newDays,
    remaining:data.remaining - daily,
    completed:isDone
  });

  const userSnap = await get(userRef);
  const u = userSnap.val();

  await update(userRef,{
    balance:(u.balance||0)+daily,
    lockedBalance:(u.lockedBalance||0)-daily
  });

  showPopup("Success","Earnings received","success");
};

/* REALTIME */
onAuthStateChanged(auth,user=>{
  if(user){
    uid=user.uid;

    const investRef = ref(db,"investments/"+uid+"/12days");

    onValue(investRef,snap=>{
      let data = snap.val() || {};
      Object.keys(data).forEach(k=> data[k].id = k);
      renderPlans(data);
    });

  }else{
    renderPlans({});
  }
});
</script>

</body>
</html>
