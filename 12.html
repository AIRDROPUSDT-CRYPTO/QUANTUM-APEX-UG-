<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>12 Days Plan</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
  color:#fff;
}

.container{padding:20px;}

/* 🔥 FINTECH CARD */
.plan{
  background:linear-gradient(135deg,#0f172a,#020617);
  padding:18px;
  border-radius:18px;
  margin-bottom:15px;
  box-shadow:
    0 0 0 1px rgba(56,189,248,0.1),
    0 0 25px rgba(56,189,248,0.15),
    inset 0 0 20px rgba(255,255,255,0.02);
  position:relative;
  overflow:hidden;
}

/* glow border */
.plan::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:18px;
  padding:1px;
  background:linear-gradient(120deg,#38bdf8,#6366f1,#22c55e);
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;
  opacity:0.3;
}

.plan h3{
  color:#38bdf8;
  font-size:22px;
  margin-bottom:6px;
}

.plan p{
  font-size:13px;
  color:#94a3b8;
  margin:4px 0;
}

/* 🔥 VALUE COLORS */
.amount-green{
  color:#22c55e;
  font-weight:700;
  text-shadow:0 0 8px rgba(34,197,94,0.5);
}

.amount-blue{
  color:#38bdf8;
  font-weight:700;
  text-shadow:0 0 8px rgba(56,189,248,0.5);
}

.amount-purple{
  color:#a78bfa;
  font-weight:700;
  text-shadow:0 0 8px rgba(167,139,250,0.5);
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:30px;
  margin-top:12px;
  background:linear-gradient(45deg,#38bdf8,#6366f1);
  color:#fff;
  cursor:pointer;
  font-weight:600;
  box-shadow:0 5px 15px rgba(99,102,241,0.3);
}

.claim-btn{
  background:linear-gradient(45deg,#22c55e,#16a34a);
  box-shadow:0 5px 15px rgba(34,197,94,0.3);
}

.disabled{
  opacity:0.4;
  pointer-events:none;
}

/* POPUP */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:0.3s;
}

.overlay.show{
  opacity:1;
  pointer-events:auto;
}

.popup{
  width:300px;
  background:#020617;
  border-radius:18px;
  padding:20px;
  text-align:center;
  box-shadow:0 0 30px rgba(0,0,0,0.6);
}

.popup.success{border:1px solid #22c55e;}
.popup.error{border:1px solid #ef4444;}
.popup.info{border:1px solid #38bdf8;}
</style>
</head>

<body>

<div class="container">
<h2>12 Days Investment Plan</h2>
<div id="plans"></div>
</div>

<div id="overlay" class="overlay">
  <div id="popup" class="popup">
    <h3 id="popTitle"></h3>
    <p id="popMsg"></p>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
import { getDatabase, ref, onValue, runTransaction, set } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyCc637WbfRNZ8-0CN4sEqEnGY27-oAdGiw",
  authDomain: "betpawa-6ef7e.firebaseapp.com",
  databaseURL: "https://betpawa-6ef7e-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "betpawa-6ef7e",
  storageBucket: "betpawa-6ef7e.firebasestorage.app",
  messagingSenderId: "908050081607",
  appId: "1:908050081607:web:db6e861fca63df78584e62"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

/* CONFIG */
const plans = [150000,500000,1000000,5000000];
const DAILY_PERCENT = 0.0917;
const DAYS = 12;

let uid=null;
let investments={};

/* POPUP */
const overlay=document.getElementById("overlay");
const popTitle=document.getElementById("popTitle");
const popMsg=document.getElementById("popMsg");

function showPopup(title,msg,type="info"){
  popTitle.innerText=title;
  popMsg.innerText=msg;
  overlay.classList.add("show");
  setTimeout(()=>overlay.classList.remove("show"),2000);
}

/* TIME */
function formatTime(ms){
  if(ms<=0) return "Ready to claim";
  let t=Math.floor(ms/1000);
  let h=Math.floor(t/3600);
  let m=Math.floor((t%3600)/60);
  let s=t%60;
  return `${h}h ${m}m ${s}s`;
}

/* RENDER */
function render(){
  const container=document.getElementById("plans");
  container.innerHTML="";

  plans.forEach(amount=>{
    let active = investments[amount];
    let div=document.createElement("div");
    div.className="plan";

    if(active){

      let last = active.lastClaim || active.startTime;
      let remainingTime = (last + 86400000) - Date.now();
      let canClaim = remainingTime <= 0;
      let remainingDays = DAYS - active.daysClaimed;

      div.innerHTML=`
        <h3>${amount.toLocaleString()} UGX</h3>
        <p>Daily Earnings: <span class="amount-green">${Math.floor(active.daily)} UGX</span></p>
        <p>Remaining Days: <span class="amount-blue">${remainingDays}</span></p>
        <p>Expected Payout: <span class="amount-purple">${Math.floor(active.total)} UGX</span></p>
        <p>${active.completed ? "Completed" : formatTime(remainingTime)}</p>
      `;

      let btn=document.createElement("button");
      btn.className="claim-btn";

      if(active.completed){
        btn.innerText="Completed";
        btn.classList.add("disabled");
      }else{
        btn.innerText="Receive Daily Earnings";
        if(!canClaim){
          btn.classList.add("disabled");
        }else{
          btn.onclick=()=>claim(amount);
        }
      }

      div.appendChild(btn);

    }else{

      div.innerHTML=`
        <h3>${amount.toLocaleString()} UGX</h3>
        <p>Duration: 12 Days</p>
        <p>Daily Profit: 9.17%</p>
      `;

      let btn=document.createElement("button");
      btn.innerText="Invest Now";
      btn.onclick=()=>invest(amount);

      div.appendChild(btn);
    }

    container.appendChild(div);
  });
}

setInterval(render,1000);

/* INVEST (UNCHANGED) */
async function invest(amount){
  const path="investments/"+uid+"/12days/"+amount;
  let created=false;

  await runTransaction(ref(db,path),data=>{
    if(data) return;
    created=true;
    return {
      amount,
      daily:amount*DAILY_PERCENT,
      total:amount*DAILY_PERCENT*DAYS,
      remaining:amount*DAILY_PERCENT*DAYS,
      lastClaim:0,
      startTime:Date.now(),
      daysClaimed:0,
      completed:false
    };
  });

  if(!created){
    showPopup("Active Plan","Already invested");
    return;
  }

  let success=false;

  await runTransaction(ref(db,"users/"+uid),user=>{
    if(user){
      if((user.balance||0) < amount) return;
      user.balance -= amount;
      user.lockedBalance = (user.lockedBalance||0)+(amount*DAILY_PERCENT*DAYS);
      success=true;
    }
    return user;
  });

  if(!success){
    await set(ref(db,path),null);
    showPopup("Error","Insufficient balance","error");
    return;
  }

  showPopup("Success","Investment started","success");
}

/* CLAIM (UNCHANGED) */
async function claim(amount){
  const investRef=ref(db,"investments/"+uid+"/12days/"+amount);

  let payout=0;
  let allowed=false;

  await runTransaction(investRef,data=>{
    if(data){
      let last=data.lastClaim || data.startTime;

      if(Date.now() >= last + 86400000){
        payout=Math.floor(data.daily);
        data.lastClaim=Date.now();
        data.daysClaimed++;
        data.remaining-=payout;
        data.completed=data.daysClaimed>=DAYS;
        allowed=true;
      }
    }
    return data;
  });

  if(!allowed){
    showPopup("Wait","Come back later");
    return;
  }

  await runTransaction(ref(db,"users/"+uid),user=>{
    if(user){
      user.balance=(user.balance||0)+payout;
      user.lockedBalance=(user.lockedBalance||0)-payout;
    }
    return user;
  });

  showPopup("Success","Earnings received","success");
}

/* REALTIME */
onAuthStateChanged(auth,user=>{
  if(user){
    uid=user.uid;

    onValue(ref(db,"investments/"+uid+"/12days"),snap=>{
      let raw=snap.val()||{};
      investments={};

      Object.keys(raw).forEach(k=>{
        let item=raw[k];
        if(item && item.amount){
          investments[item.amount]=item;
        }
      });

      render();
    });
  }
});
</script>

</body>
  </html>
