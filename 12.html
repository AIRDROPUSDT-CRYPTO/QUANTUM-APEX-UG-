<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>12 Days Plan</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
  color:#fff;
}

.container{padding:20px;}

.plan{
  background:linear-gradient(135deg,#0f172a,#020617);
  padding:18px;
  border-radius:18px;
  margin-bottom:15px;
  box-shadow:
    0 0 0 1px rgba(56,189,248,0.1),
    0 0 25px rgba(56,189,248,0.15),
    inset 0 0 20px rgba(255,255,255,0.02);
  position:relative;
  overflow:hidden;
}

.plan::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:18px;
  padding:1px;
  background:linear-gradient(120deg,#38bdf8,#6366f1,#22c55e);
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;
  opacity:0.3;
  pointer-events:none;
}

.plan h3{
  color:#38bdf8;
  font-size:22px;
  margin-bottom:6px;
}

.plan p{
  font-size:13px;
  color:#94a3b8;
  margin:4px 0;
}

.amount-green{color:#22c55e;font-weight:700;}
.amount-blue{color:#38bdf8;font-weight:700;}
.amount-purple{color:#a78bfa;font-weight:700;}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:30px;
  margin-top:12px;
  background:linear-gradient(45deg,#38bdf8,#6366f1);
  color:#fff;
  cursor:pointer;
  font-weight:600;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:0.3s;
}

.overlay.show{
  opacity:1;
  pointer-events:auto;
}

.popup{
  width:300px;
  background:#020617;
  border-radius:18px;
  padding:20px;
  text-align:center;
}
</style>
</head>

<body>

<div class="container">
<h2>12 Days Investment Plan</h2>
<div id="plans"></div>
</div>

<div id="overlay" class="overlay">
  <div class="popup">
    <h3 id="popTitle"></h3>
    <p id="popMsg"></p>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
import { getDatabase, ref, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "betpawa-6ef7e.firebaseapp.com",
  databaseURL: "https://betpawa-6ef7e-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "betpawa-6ef7e",
  storageBucket: "betpawa-6ef7e.appspot.com",
  messagingSenderId: "908050081607",
  appId: "1:908050081607:web:db6e861fca63df78584e62"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

const plans = [150000,500000,1000000,5000000];
const DAILY_PERCENT = 0.0917;
const DAYS = 12;

const overlay=document.getElementById("overlay");
const popTitle=document.getElementById("popTitle");
const popMsg=document.getElementById("popMsg");

function showPopup(title,msg){
  popTitle.innerText=title;
  popMsg.innerText=msg;
  overlay.classList.add("show");
  setTimeout(()=>overlay.classList.remove("show"),2000);
}

function render(){
  const container=document.getElementById("plans");
  container.innerHTML="";

  plans.forEach(amount=>{
    let div=document.createElement("div");
    div.className="plan";

    let expected = amount * DAILY_PERCENT * DAYS;

    div.innerHTML=`
      <h3>${amount.toLocaleString()} UGX</h3>
      <p>Duration: <span class="amount-blue">${DAYS} Days</span></p>
      <p>Daily Profit: <span class="amount-green">${(DAILY_PERCENT*100).toFixed(2)}%</span></p>
      <p>Expected Payout: <span class="amount-purple">${Math.floor(expected)} UGX</span></p>
    `;

    let btn=document.createElement("button");
    btn.innerText="Invest Now";
    btn.onclick=()=>invest(amount);

    div.appendChild(btn);
    container.appendChild(div);
  });
}

async function invest(amount){

  const user = auth.currentUser; // ✅ REAL SESSION

  if(!user){
    showPopup("Error","User not logged in");
    return;
  }

  const uid = user.uid;

  const path="investments/"+uid+"/12days/"+amount;

  let created=false;

  try{
    await runTransaction(ref(db,path),data=>{
      if(data) return;
      created=true;
      return {
        amount,
        daily:amount*DAILY_PERCENT,
        total:amount*DAILY_PERCENT*DAYS,
        remaining:amount*DAILY_PERCENT*DAYS,
        lastClaim:0,
        startTime:Date.now(),
        daysClaimed:0,
        completed:false
      };
    });
  }catch(e){
    showPopup("Error","Permission denied");
    return;
  }

  if(!created){
    showPopup("Active Plan","Already invested");
    return;
  }

  showPopup("Success","Investment started");
}

render();
</script>

</body>
</html>
