<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>12 Days Plan</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
  color:#e2e8f0;
}

.container{
  padding:22px;
  max-width:500px;
  margin:auto;
}

h2{
  font-weight:400;
  margin-bottom:18px;
}

.plan{
  padding:18px 0;
  border-bottom:1px solid rgba(255,255,255,0.06);
}

.plan h3{color:#38bdf8;font-size:18px;}

.plan p{
  font-size:13px;
  margin:2px 0;
}

.amount-days{color:#facc15;}
.amount-percent{color:#22c55e;}
.amount-payout{color:#a78bfa;}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:30px;
  margin-top:12px;
  background:linear-gradient(45deg,#38bdf8,#6366f1);
  color:#fff;
  cursor:pointer;
}

.claim-btn{
  background:linear-gradient(45deg,#22c55e,#16a34a);
}

.toast{
  position:fixed;
  top:20px;
  right:-400px;
  transition:0.4s;
}

.toast.show{right:20px;}
.toast.success{color:#4ade80;}
.toast.warning{color:#f87171;}
.toast.info{color:#60a5fa;}
</style>
</head>

<body>

<div class="container">
<h2>12 Days Investment Plan</h2>
<div id="plans"></div>
</div>

<div id="toast" class="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";
import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-functions.js";

/* CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCc637WbfRNZ8-0CN4sEqEnGY27-oAdGiw",
  authDomain: "betpawa-6ef7e.firebaseapp.com",
  databaseURL: "https://betpawa-6ef7e-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "betpawa-6ef7e",
  storageBucket: "betpawa-6ef7e.firebasestorage.app",
  messagingSenderId: "908050081607",
  appId: "1:908050081607:web:db6e861fca63df78584e62"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

/* ✅ FIXED (NO REGION HARD-CODING) */
const functions = getFunctions(app);

/* ✅ CALLABLE */
const investPlan = httpsCallable(functions, "investPlan");
const claimEarnings = httpsCallable(functions, "claimEarnings");

/* PLANS */
const plans = [
  {amount:150000, percent:15},
  {amount:500000, percent:25},
  {amount:1000000, percent:35},
  {amount:5000000, percent:45}
];

const DAYS=12;

let investments={};
const toast=document.getElementById("toast");

/* TOAST */
function showToast(type,msg){
  toast.className="toast "+type;
  toast.innerText=msg;
  toast.classList.add("show");
  setTimeout(()=>toast.classList.remove("show"),2500);
}

/* ERROR HANDLER */
function getErrorMessage(e){
  if (!navigator.onLine) return "No internet connection";

  if (e.code === "functions/internal") {
    return "Server error. Check Firebase Functions (deploy or billing)";
  }

  return (
    e?.details ||
    e?.message ||
    "Request failed"
  );
}

/* TIMER */
function format(ms){
  if(ms<=0) return "Ready to claim";
  let s=Math.floor(ms/1000);
  return `${Math.floor(s/3600)}h ${Math.floor((s%3600)/60)}m ${s%60}s`;
}

/* UI */
function render(){
  const box=document.getElementById("plans");
  box.innerHTML="";

  plans.forEach(p=>{
    let inv=investments[p.amount];
    let div=document.createElement("div");
    div.className="plan";

    if(inv){
      let last=inv.lastClaim||inv.startTime;
      let time=(last+86400000)-Date.now();

      div.innerHTML=`
        <h3>${p.amount.toLocaleString()} UGX</h3>
        <p>Days Remaining: <span class="amount-days">${DAYS-inv.daysClaimed}</span></p>
        <p>Daily Profit: <span class="amount-percent">${Math.floor(inv.daily)} UGX</span></p>
        <p>Total Payout: <span class="amount-payout">${Math.floor(inv.total)} UGX</span></p>
        <p>${format(time)}</p>
      `;

      let btn=document.createElement("button");
      btn.className="claim-btn";
      btn.innerText="Receive Daily Earnings";

      if(time<=0) btn.onclick=()=>claim(p.amount);
      else btn.style.opacity="0.5";

      div.appendChild(btn);

    }else{
      let total=p.amount*(p.percent/100)*DAYS;

      div.innerHTML=`
        <h3>${p.amount.toLocaleString()} UGX</h3>
        <p>Duration: <span class="amount-days">${DAYS} Days</span></p>
        <p>Daily Profit: <span class="amount-percent">${p.percent}%</span></p>
        <p>Total Payout: <span class="amount-payout">${Math.floor(total)} UGX</span></p>
      `;

      let btn=document.createElement("button");
      btn.innerText="Invest Now";
      btn.onclick=()=>invest(p.amount);

      div.appendChild(btn);
    }

    box.appendChild(div);
  });
}

/* INVEST */
async function invest(amount){
  try{
    const res = await investPlan({amount});
    console.log(res.data);
    showToast("success","Investment started");
  }catch(e){
    console.error("INVEST ERROR:", e);
    showToast("warning", getErrorMessage(e));
  }
}

/* CLAIM */
async function claim(amount){
  try{
    const res = await claimEarnings({amount});
    console.log(res.data);
    showToast("success","Earnings received");
  }catch(e){
    console.error("CLAIM ERROR:", e);
    showToast("info", getErrorMessage(e));
  }
}

/* REALTIME */
onAuthStateChanged(auth,u=>{
  if(u){
    onValue(ref(db,"investments/"+u.uid+"/12days"),snap=>{
      let raw=snap.val()||{};
      investments={};

      Object.values(raw).forEach(v=>{
        investments[v.amount]=v;
      });

      render();
    });
  }else{
    render();
  }
});

setInterval(render,1000);
</script>

</body>
</html>
