<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quantum Apex Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}
html,body{height:100%;overflow:hidden;background:#020617;color:#fff;}
#chatApp{height:100%;display:flex;flex-direction:column;}
.header{padding:12px;text-align:center;background:#0f172a;font-weight:600;}
.status{font-size:11px;color:#22c55e;}
.messages{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;}
.msg{margin-bottom:12px;max-width:75%;}
.name{font-size:11px;color:#38bdf8;}
.time{font-size:10px;opacity:0.6;margin-left:6px;}
.bubble{padding:10px;border-radius:12px;margin-top:3px;position:relative;}
.me{align-self:flex-end;}
.me .bubble{background:#22c55e;color:#000;}
.other .bubble{background:#1e293b;}
.tick{font-size:11px;margin-left:6px;}
.chat-img{max-width:150px;border-radius:10px;margin-top:5px;}
.typing{font-size:12px;color:#94a3b8;padding:5px 10px;}
.input-box{display:flex;padding:8px;background:#0f172a;gap:6px;}
#msgInput{flex:1;padding:8px;border:none;border-radius:20px;outline:none;}
.icon-btn{width:38px;height:38px;display:flex;align-items:center;justify-content:center;background:#1e293b;border:none;border-radius:50%;color:#fff;}
.send-btn{background:#22c55e;color:#000;}
#fileInput{display:none;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e293b;padding:10px 16px;border-radius:10px;display:none;}
</style>
</head>

<body>

<div id="login">
  <h2>Enter Username</h2>
  <input id="username">
  <input id="email" placeholder="Email">
  <button onclick="enterChat()">Continue</button>
</div>

<div id="chatApp" style="display:none;">
  <div class="header">
    Quantum Apex Live Chat
    <div id="status" class="status"></div>
  </div>

  <div id="messages" class="messages"></div>
  <div id="typing" class="typing"></div>

  <div class="input-box">
    <button class="icon-btn" onclick="fileInput.click()">📎</button>
    <input id="msgInput" placeholder="Type message...">
    <button class="icon-btn send-btn" onclick="sendMessage()">➤</button>
    <input type="file" id="fileInput" accept="image/*">
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCc637WbfRNZ8-0CN4sEqEnGY27-oAdGiw",
  authDomain: "betpawa-6ef7e.firebaseapp.com",
  databaseURL: "https://betpawa-6ef7e-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "betpawa-6ef7e",
  storageBucket: "betpawa-6ef7e.firebasestorage.app",
  messagingSenderId: "908050081607",
  appId: "1:908050081607:web:db6e861fca63df78584e62"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

/* ✅ WAIT FOR AUTH */
firebase.auth().onAuthStateChanged(user=>{
  if(!user){
    firebase.auth().signInAnonymously();
  } else {
    initApp(); // start chat ONLY after auth
  }
});

let currentUser = "";
let currentEmail = "";

/* INIT AFTER AUTH */
function initApp(){
  currentUser = localStorage.getItem("chatUser") || "";
  currentEmail = localStorage.getItem("chatEmail") || "";

  if(currentUser && currentEmail){
    showChat();
  }
}

function showToast(msg){
  toast.innerText = msg;
  toast.style.display="block";
  setTimeout(()=>toast.style.display="none",2500);
}

function enterChat(){
  let name=username.value.trim();
  let emailVal=email.value.trim();
  if(!name || !emailVal) return;

  localStorage.setItem("chatUser",name);
  localStorage.setItem("chatEmail",emailVal);

  currentUser=name;
  currentEmail=emailVal;

  showChat();
}

function showChat(){
  login.style.display="none";
  chatApp.style.display="flex";
  loadMessages();
  listenTyping();
  trackPresence();
}

/* PRESENCE */
function trackPresence(){
  setInterval(()=>{
    db.ref("presence/"+currentEmail).set({
      name:currentUser,
      lastSeen:Date.now(),
      online:true
    });
  },5000);
}

/* TYPING */
msgInput.addEventListener("input", ()=>{
  db.ref("typing/"+currentEmail).set({
    name:currentUser,
    typing: msgInput.value.length>0
  });
});

function listenTyping(){
  db.ref("typing").on("value",snap=>{
    let t="";
    snap.forEach(d=>{
      let val=d.val();
      if(val && val.typing && d.key!==currentEmail){
        t=val.name+" is typing...";
      }
    });
    typing.innerText=t;
  });
}

/* SEND */
function sendMessage(){
  let text=msgInput.value.trim();
  let file=fileInput.files[0];
  if(!text && !file) return;

  let id=Date.now();

  let data={
    id:id,
    name:currentUser,
    userEmail:currentEmail,
    time:Date.now(),
    delivered:true
  };

  if(file){
    let reader=new FileReader();
    reader.onload=e=>{
      data.image=e.target.result;
      db.ref("messages/"+id).set(data);
    };
    reader.readAsDataURL(file);
  } else {
    data.text=text;
    db.ref("messages/"+id).set(data);
  }

  msgInput.value="";
  fileInput.value="";
}

/* LOAD */
function loadMessages(){
  db.ref("messages").on("value",snap=>{
    messages.innerHTML="";
    snap.forEach(d=>{
      let m=d.val();
      if(!m) return;

      let div=document.createElement("div");
      div.className="msg "+(m.userEmail===currentEmail?"me":"other");

      let content=m.text || `<img src="${m.image}" class="chat-img">`;

      let ticks = m.userEmail===currentEmail ? `<span class="tick">✓✓</span>` : "";

      div.innerHTML=`
        <div class="name">
          ${m.name}
          <span class="time">${new Date(m.time).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</span>
        </div>

        <div class="bubble">
          ${content}
          ${ticks}
        </div>
      `;

      messages.appendChild(div);
    });

    messages.scrollTop=messages.scrollHeight;
  });
}
</script>

</body>
</html>
