<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexora Capital Chat Room</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

html,body{
  height:100%;
  overflow:hidden;
  background:#e5e7eb;
  color:#111;
}

/* 🔥 NEW PROFESSIONAL LOGIN DESIGN */
#login{
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  background: radial-gradient(circle at top,#0f172a,#020617);
}

.login-card{
  width:340px;
  padding:30px 25px;
  border-radius:18px;
  background:linear-gradient(145deg,#020617,#0f172a);
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
  text-align:center;
  border:1px solid rgba(56,189,248,0.2);
  animation:fadeIn 0.5s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

.login-title{
  font-size:20px;
  color:#38bdf8;
  margin-bottom:5px;
  font-weight:600;
}

.login-sub{
  font-size:12px;
  color:#94a3b8;
  margin-bottom:20px;
}

.login-card input{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border:none;
  outline:none;
  background:#020617;
  color:#fff;
  border:1px solid rgba(148,163,184,0.2);
}

.login-card input:focus{
  border:1px solid #38bdf8;
}

.join-btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:30px;
  background:linear-gradient(45deg,#38bdf8,#6366f1);
  color:#fff;
  font-weight:600;
  cursor:pointer;
  margin-top:5px;
}

.join-btn:hover{
  opacity:0.9;
}

/* CHAT (UNCHANGED) */
.messages{
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  background:
    linear-gradient(rgba(255,255,255,0.9), rgba(255,255,255,0.9)),
    url('https://www.transparenttextures.com/patterns/diamond-upholstery.png');
}

#chatApp{height:100%;display:flex;flex-direction:column;}

.header{
  padding:12px;
  text-align:center;
  background:#22c55e;
  color:#000;
  font-weight:600;
}

.status{font-size:11px;color:#065f46;}

.msg{margin-bottom:12px;max-width:75%;}

.name{font-size:11px;color:#0ea5e9;}

.time{font-size:10px;opacity:0.6;margin-left:6px;}

.bubble{
  padding:10px;
  border-radius:12px;
  margin-top:3px;
  position:relative;
}

.me{align-self:flex-end;}
.me .bubble{
  background:#22c55e;
  color:#000;
}

.other .bubble{
  background:#ffffff;
  color:#111;
  border:1px solid #ddd;
}

.tick{font-size:11px;margin-left:6px;}

.chat-img{
  max-width:150px;
  border-radius:10px;
  margin-top:5px;
}

.typing{
  font-size:12px;
  color:#555;
  padding:5px 10px;
}

.input-box{
  display:flex;
  padding:8px;
  background:#f1f5f9;
  gap:6px;
}

#msgInput{
  flex:1;
  padding:8px;
  border:none;
  border-radius:20px;
  outline:none;
}

.icon-btn{
  width:38px;height:38px;
  display:flex;align-items:center;justify-content:center;
  background:#e2e8f0;
  border:none;border-radius:50%;
  color:#000;
}

.send-btn{
  background:#22c55e;
  color:#000;
}

#fileInput{display:none;}

.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  color:#fff;
  padding:10px 16px;
  border-radius:10px;
  display:none;
}

.reply-box{
  background:#dcfce7;
  padding:6px;
  font-size:12px;
  margin-bottom:5px;
  border-left:4px solid #22c55e;
  color:#065f46;
  border-radius:6px;
}

.reaction{
  position:absolute;
  bottom:-10px;
  right:5px;
  font-size:14px;
}
</style>
</head>

<body>

<!-- 🔥 NEW LOGIN UI -->
<div id="login">
  <div class="login-card">
    <div class="login-title">Quantum Apex Chat</div>
    <div class="login-sub">Join the live conversation</div>

    <input id="username" placeholder="Enter username">
    <input id="email" placeholder="Enter email">

    <button class="join-btn" onclick="enterChat()">Continue</button>
  </div>
</div>

<!-- CHAT (UNCHANGED) -->
<div id="chatApp" style="display:none;">
  <div class="header">
    Quantum Apex Live Chat
    <div id="status" class="status"></div>
  </div>

  <div id="messages" class="messages"></div>
  <div id="typing" class="typing"></div>

  <div class="input-box">
    <button class="icon-btn" onclick="fileInput.click()">📎</button>
    <input id="msgInput" placeholder="Type message...">
    <button class="icon-btn send-btn" onclick="sendMessage()">➤</button>
    <input type="file" id="fileInput" accept="image/*">
  </div>
</div>

<div id="toast" class="toast"></div>

<!-- 🔒 SCRIPT (UNCHANGED) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCc637WbfRNZ8-0CN4sEqEnGY27-oAdGiw",
  authDomain: "betpawa-6ef7e.firebaseapp.com",
  databaseURL: "https://betpawa-6ef7e-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "betpawa-6ef7e",
  storageBucket: "betpawa-6ef7e.firebasestorage.app",
  messagingSenderId: "908050081607",
  appId: "1:908050081607:web:db6e861fca63df78584e62"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* AUTH */
firebase.auth().onAuthStateChanged(user=>{
  if(!user){
    firebase.auth().signInAnonymously();
  } else {
    autoLoadUser(user.uid);
  }
});

let currentUser="";
let currentEmail="";
let replyTo=null;

/* 🔥 AUTO LOAD USER FROM FIREBASE */
function autoLoadUser(uid){
  db.ref("users/"+uid).once("value").then(snap=>{
    let data = snap.val();

    if(data && data.username && data.email){
      currentUser = data.username;
      currentEmail = data.email;

      localStorage.setItem("chatUser", currentUser);
      localStorage.setItem("chatEmail", currentEmail);

      showChat();
    } else {
      initApp(uid);
    }
  });
}

/* 🔥 CHECK LOCAL STORAGE (REMEMBER USER FOREVER) */
function initApp(uid){
  currentUser = localStorage.getItem("chatUser") || "";
  currentEmail = localStorage.getItem("chatEmail") || "";

  if(currentUser && currentEmail){
    showChat();
  } else {
    login.style.display="flex";

    /* 🔥 PREFILL INPUTS IF EXIST */
    username.value = currentUser;
    email.value = currentEmail;
  }
}

/* 🔥 TOAST */
function showToast(msg){
  toast.innerText=msg;
  toast.style.display="block";
  setTimeout(()=>toast.style.display="none",2000);
}

/* 🔥 ENTER CHAT + SAVE TO FIREBASE */
function enterChat(){
  let name=username.value.trim();
  let emailVal=email.value.trim();

  if(!name || !emailVal){
    showToast("Fill all fields");
    return;
  }

  let user = firebase.auth().currentUser;
  if(!user) return;

  /* SAVE TO LOCAL */
  localStorage.setItem("chatUser",name);
  localStorage.setItem("chatEmail",emailVal);

  currentUser=name;
  currentEmail=emailVal;

  /* 🔥 SAVE TO FIREBASE (ONLY ONCE / UPDATE SAFE) */
  db.ref("users/"+user.uid).update({
    username:name,
    email:emailVal
  });

  showChat();
}

/* 🔥 SHOW CHAT */
function showChat(){
  login.style.display="none";
  chatApp.style.display="flex";
  loadMessages();
  listenTyping();
  trackPresence();
}

/* PRESENCE */
function trackPresence(){
  setInterval(()=>{
    db.ref("presence/"+currentEmail).set({
      name:currentUser,
      lastSeen:Date.now(),
      online:true
    });
  },5000);

  db.ref("presence").on("value",snap=>{
    let online=0;
    snap.forEach(d=>{
      let val=d.val();
      if(val.online) online++;
    });
    status.innerText = online+" online";
  });
}

/* TYPING */
msgInput.addEventListener("input", ()=>{
  db.ref("typing/"+currentEmail).set({
    name:currentUser,
    typing: msgInput.value.length>0
  });
});

function listenTyping(){
  db.ref("typing").on("value",snap=>{
    let t="";
    snap.forEach(d=>{
      let val=d.val();
      if(val && val.typing && d.key!==currentEmail){
        t=val.name+" is typing...";
      }
    });
    typing.innerText=t;
  });
}

/* SEND */
function sendMessage(){
  let text=msgInput.value.trim();
  let file=fileInput.files[0];
  if(!text && !file) return;

  let id=Date.now();

  let data={
    id:id,
    name:currentUser,
    userEmail:currentEmail,
    time:Date.now(),
    delivered:true,
    reply: replyTo || null
  };

  replyTo=null;

  if(file){
    let reader=new FileReader();
    reader.onload=e=>{
      data.image=e.target.result;
      db.ref("messages/"+id).set(data);
    };
    reader.readAsDataURL(file);
  } else {
    data.text=text;
    db.ref("messages/"+id).set(data);
  }

  msgInput.value="";
  fileInput.value="";
}

/* LOAD */
function loadMessages(){
  db.ref("messages").on("value",snap=>{
    messages.innerHTML="";

    snap.forEach(d=>{
      let m=d.val();
      if(!m) return;

      let div=document.createElement("div");
      div.className="msg "+(m.userEmail===currentEmail?"me":"other");

      div.ondblclick=()=>{
        db.ref("messages/"+m.id+"/reaction").set("❤️");
      };

      div.oncontextmenu=(e)=>{
        e.preventDefault();
        if(m.userEmail===currentEmail){
          db.ref("messages/"+m.id).remove();
        }
      };

      let startX=0;
      div.addEventListener("touchstart",e=>startX=e.touches[0].clientX);
      div.addEventListener("touchend",e=>{
        let diff=e.changedTouches[0].clientX - startX;
        if(diff>60){
          replyTo = m.text || "📷 image";
          showToast("Replying...");
        }
      });

      let replyHTML = m.reply ? `<div class="reply-box">${m.reply}</div>` : "";
      let content=m.text || `<img src="${m.image}" class="chat-img">`;
      let ticks = m.userEmail===currentEmail ? `<span class="tick">✓✓</span>` : "";

      div.innerHTML=`
        <div class="name">
          ${m.name}
          <span class="time">${new Date(m.time).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</span>
        </div>

        <div class="bubble">
          ${replyHTML}
          ${content}
          ${ticks}
          ${m.reaction ? `<div class="reaction">${m.reaction}</div>` : ""}
        </div>
      `;

      messages.appendChild(div);
    });

    messages.scrollTop=messages.scrollHeight;
  });
}
</script>

</body>
</html>
