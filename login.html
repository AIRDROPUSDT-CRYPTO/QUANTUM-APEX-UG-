<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Quantum Apex Ug</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background: radial-gradient(circle at top,#020617,#0f172a 60%,#000);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  color:#fff;
}

/* HEADER */
.header{
  position:absolute;
  top:20px;
  width:100%;
  text-align:center;
  color:#38bdf8;
  font-weight:600;
  letter-spacing:3px;
  text-shadow:0 0 15px rgba(56,189,248,0.6);
}

/* CARD */
.container{
  width:360px;
  padding:30px;
  border-radius:20px;
  background:linear-gradient(145deg,#020617,#0f172a);
  border:1px solid rgba(56,189,248,0.2);
  box-shadow:0 0 40px rgba(56,189,248,0.15);
  text-align:center;
}

h2{
  margin-bottom:20px;
  color:#38bdf8;
}

/* INPUTS */
input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:none;
  outline:none;
  background:#020617;
  color:#fff;
  border:1px solid rgba(148,163,184,0.2);
  transition:0.2s;
}

input:focus{
  border:1px solid #38bdf8;
  box-shadow:0 0 10px rgba(56,189,248,0.3);
}

/* BUTTONS */
.login-btn{
  width:100%;
  padding:13px;
  margin-top:10px;
  border:none;
  border-radius:30px;
  background:linear-gradient(45deg,#38bdf8,#6366f1);
  color:#fff;
  cursor:pointer;
  box-shadow:0 5px 20px rgba(56,189,248,0.4);
}

.reset-btn{
  width:100%;
  padding:11px;
  margin-top:10px;
  border:none;
  border-radius:30px;
  background:linear-gradient(45deg,#22c55e,#16a34a);
  color:#fff;
  cursor:pointer;
}

/* LINKS */
.links{
  margin-top:12px;
}
.links span{
  font-size:13px;
  color:#94a3b8;
  cursor:pointer;
}
.links span:hover{
  color:#38bdf8;
}

/* LOADER */
.loader-overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:2000;
}
.loader{
  width:50px;
  height:50px;
  border:5px solid #38bdf8;
  border-top:5px solid transparent;
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* TOAST POPUP */
.popup{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0.85);
  background:#020617;
  padding:20px 30px;
  border-radius:12px;
  text-align:center;
  opacity:0;
  transition:0.25s;
  z-index:3000;
}

.popup.show{
  opacity:1;
  transform:translate(-50%,-50%) scale(1);
}

.popup.success{border:2px solid #22c55e;}
.popup.error{border:2px solid #ef4444;}
</style>
</head>

<body>

<div class="header">QUANTUM APEX UG</div>

<div class="container">
  <h2>Login</h2>

  <input type="email" id="email" placeholder="Email Address">
  <input type="password" id="password" placeholder="Password">

  <button class="login-btn" onclick="login()">Login</button>
  <button class="reset-btn" onclick="forgotPassword()">Reset Password</button>

  <div class="links">
    <span onclick="goRegister()">Create Account</span>
  </div>
</div>

<!-- LOADER -->
<div class="loader-overlay" id="loader">
  <div class="loader"></div>
</div>

<!-- TOAST -->
<div id="popup" class="popup">
  <p id="popupMsg"></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  sendPasswordResetEmail,
  setPersistence,
  browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";

import {
  getDatabase,
  ref,
  onValue
} from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

/* CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCc637WbfRNZ8-0CN4sEqEnGY27-oAdGiw",
  authDomain: "betpawa-6ef7e.firebaseapp.com",
  databaseURL: "https://betpawa-6ef7e-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "betpawa-6ef7e",
  storageBucket: "betpawa-6ef7e.firebasestorage.app",
  messagingSenderId: "908050081607",
  appId: "1:908050081607:web:db6e861fca63df78584e62"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const loader = document.getElementById("loader");

/* TOAST */
function showPopup(msg,type){
  const popup=document.getElementById("popup");
  popup.className="popup show "+type;
  document.getElementById("popupMsg").innerText=msg;
  setTimeout(()=>popup.classList.remove("show"),2000);
}

/* LOGIN */
window.login = async function(){

  let email = document.getElementById("email").value.trim();
  let password = document.getElementById("password").value;

  if(!email || !password){
    return showPopup("Fill all fields","error");
  }

  loader.style.display="flex";

  try{
    await setPersistence(auth, browserLocalPersistence);

    const userCredential = await signInWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    /* SYNC USER */
    onValue(ref(db,"users/"+user.uid),(snap)=>{
      localStorage.setItem("userData",JSON.stringify(snap.val()));
    });

    showPopup("Login successful","success");

    setTimeout(()=>{
      location.href="dashboard.html";
    },1200);

  }catch(error){

    let msg="Login failed";

    if(error.code==="auth/invalid-email") msg="Invalid email";
    if(error.code==="auth/user-not-found") msg="Account not found";
    if(error.code==="auth/wrong-password") msg="Wrong password";

    showPopup(msg,"error");
  }

  loader.style.display="none";
}

/* RESET */
window.forgotPassword = function(){

  let email=document.getElementById("email").value.trim();

  if(!email){
    return showPopup("Enter your email","error");
  }

  sendPasswordResetEmail(auth,email)
  .then(()=>{
    showPopup("Reset email sent","success");
  })
  .catch(()=>{
    showPopup("Failed to send email","error");
  });
}

window.goRegister = function(){
  location.href="register.html";
}
</script>

</body>
</html>
