<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | Nexora Capital</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  background:linear-gradient(135deg,#020617,#0f172a);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  color:#e2e8f0;
}

/* HEADER */
.header{
  position:fixed;
  top:20px;
  width:100%;
  text-align:center;
}

/* CARD */
.container{
  width:340px;
  padding:25px;
  border-radius:16px;
  background:#0f172a;
  position:relative;
  box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

/* GLOW BORDER */
.container::before{
  content:"";
  position:absolute;
  inset:0;
  padding:1px;
  border-radius:16px;
  background:linear-gradient(135deg,#2563eb,#7c3aed,#22c55e);
  -webkit-mask:
    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;

  pointer-events:none; /* IMPORTANT */
}

/* TEXT */
h2{
  margin-bottom:5px;
  font-size:18px;
  color:#f1f5f9;
}

.subtext{
  font-size:13px;
  color:#94a3b8;
  margin-bottom:15px;
}

/* INPUTS */
input{
  width:100%;
  padding:11px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #1e293b;
  outline:none;
  font-size:14px;
  background:#020617;
  color:#e2e8f0;
}

input:focus{
  border-color:#2563eb;
  box-shadow:0 0 0 2px rgba(37,99,235,0.2);
}

/* BUTTONS */
.login-btn{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:linear-gradient(135deg,#2563eb,#4f46e5);
  color:#fff;
  cursor:pointer;
}

.reset-btn{
  width:100%;
  padding:11px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  background:#1e293b;
  color:#e2e8f0;
}

/* LINKS */
.links{
  margin-top:12px;
  text-align:center;
}

.links span{
  font-size:13px;
  color:#60a5fa;
  cursor:pointer;
}

.links span:hover{
  text-decoration:underline;
}

/* FOOTER */
.footer{
  text-align:center;
  margin-top:12px;
  font-size:11px;
  color:#64748b;
}

/* LOADER */
.loader-overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:2000;
}

.loader{
  width:40px;
  height:40px;
  border:4px solid #2563eb;
  border-top:4px solid transparent;
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* POPUP */
.popup{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0.9);
  background:#0f172a;
  color:#e2e8f0;
  padding:18px 25px;
  border-radius:10px;
  text-align:center;
  opacity:0;
  transition:0.25s;
  z-index:3000;
}

.popup.show{
  opacity:1;
  transform:translate(-50%,-50%) scale(1);
}

.popup.success{border-left:4px solid #22c55e;}
.popup.error{border-left:4px solid #ef4444;}
</style>
</head>

<body>

<div class="header">
  <h3>Nexora Capital</h3>
</div>

<div class="container">
  <h2>Welcome back</h2>
  <p class="subtext">Sign in to continue</p>

  <input type="email" id="email" placeholder="Email Address">
  <input type="password" id="password" placeholder="Password">

  <button class="login-btn" onclick="login()">Sign In</button>
  <button class="reset-btn" onclick="forgotPassword()">Forgot Password?</button>

  <div class="links">
    <span onclick="goRegister()">Create an account</span>
  </div>

  <div class="footer">
    © Nexora Capital
  </div>
</div>

<!-- LOADER -->
<div class="loader-overlay" id="loader">
  <div class="loader"></div>
</div>

<!-- POPUP -->
<div id="popup" class="popup">
  <p id="popupMsg"></p>
</div>

<script type="module">
/* 🔥 YOUR ORIGINAL JS — UNCHANGED */
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  sendPasswordResetEmail,
  setPersistence,
  browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";

import {
  getDatabase,
  ref,
  onValue
} from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCc637WbfRNZ8-0CN4sEqEnGY27-oAdGiw",
  authDomain: "betpawa-6ef7e.firebaseapp.com",
  databaseURL: "https://betpawa-6ef7e-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "betpawa-6ef7e",
  storageBucket: "betpawa-6ef7e.firebasestorage.app",
  messagingSenderId: "908050081607",
  appId: "1:908050081607:web:db6e861fca63df78584e62"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const loader = document.getElementById("loader");

function showPopup(msg,type){
  const popup=document.getElementById("popup");
  popup.className="popup show "+type;
  document.getElementById("popupMsg").innerText=msg;
  setTimeout(()=>popup.classList.remove("show"),2000);
}

window.login = async function(){
  let email = document.getElementById("email").value.trim();
  let password = document.getElementById("password").value;

  if(!email || !password){
    return showPopup("Fill all fields","error");
  }

  loader.style.display="flex";

  try{
    await setPersistence(auth, browserLocalPersistence);

    const userCredential = await signInWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    onValue(ref(db,"users/"+user.uid),(snap)=>{
      localStorage.setItem("userData",JSON.stringify(snap.val()));
    });

    showPopup("Login successful","success");

    setTimeout(()=>{
      location.href="dashboard.html";
    },1200);

  }catch(error){
    let msg="Login failed";

    if(error.code==="auth/invalid-email") msg="Invalid email";
    if(error.code==="auth/user-not-found") msg="Account not found";
    if(error.code==="auth/wrong-password") msg="Wrong password";

    showPopup(msg,"error");
  }

  loader.style.display="none";
}

window.forgotPassword = function(){
  let email=document.getElementById("email").value.trim();

  if(!email){
    return showPopup("Enter your email","error");
  }

  sendPasswordResetEmail(auth,email)
  .then(()=> showPopup("Reset email sent","success"))
  .catch(()=> showPopup("Failed to send email","error"));
}

window.goRegister = function(){
  location.href="register.html";
}
</script>

</body>
</html>
