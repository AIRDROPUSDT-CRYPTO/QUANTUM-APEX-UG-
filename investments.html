<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Investments | Quantum Apex Ug</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background:linear-gradient(135deg,#020617,#020617,#0f172a);
  color:#fff;
}

.topbar{
  padding:15px;
  text-align:center;
  font-weight:600;
  background:rgba(15,23,42,0.7);
  backdrop-filter:blur(10px);
}

.container{padding:20px;}

.section-title{
  margin:20px 0 10px;
  font-size:14px;
  color:#38bdf8;
}

.card{
  position:relative;
  background:linear-gradient(135deg,#0f172a,#020617);
  padding:18px;
  border-radius:18px;
  margin-bottom:14px;
  overflow:hidden;
  box-shadow:
    0 0 0 1px rgba(56,189,248,0.1),
    0 0 30px rgba(56,189,248,0.15),
    inset 0 0 25px rgba(255,255,255,0.02);
}

.card::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:18px;
  padding:1px;
  background:linear-gradient(120deg,#38bdf8,#6366f1,#22c55e);
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;
  opacity:0.4;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.plan{
  font-size:15px;
  font-weight:600;
  color:#38bdf8;
}

.status{
  font-size:11px;
  padding:4px 10px;
  border-radius:12px;
}

.active{
  background:rgba(34,197,94,0.15);
  color:#22c55e;
}

.completed{
  background:rgba(148,163,184,0.15);
  color:#94a3b8;
}

.details{
  margin-top:10px;
  font-size:13px;
  color:#94a3b8;
}

.countdown{
  margin-top:12px;
  font-size:14px;
  font-weight:600;
  color:#22c55e;
}

.empty{
  text-align:center;
  margin-top:40px;
  color:#64748b;
}
</style>
</head>

<body>

<div class="topbar">My Investments</div>
<div class="container" id="container"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
import { getDatabase, ref, onValue, off } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";

/* CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCc637WbfRNZ8-0CN4sEqEnGY27-oAdGiw",
  authDomain: "betpawa-6ef7e.firebaseapp.com",
  databaseURL: "https://betpawa-6ef7e-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "betpawa-6ef7e",
  storageBucket: "betpawa-6ef7e.firebasestorage.app",
  messagingSenderId: "908050081607",
  appId: "1:908050081607:web:db6e861fca63df78584e62"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

const container = document.getElementById("container");

let unsubscribe = null;
let timers = [];

/* PLAN DURATIONS */
const durations = {
  "24hrs": 1,
  "3days": 3,
  "7days": 7,
  "12days": 12,
  "21days": 21,
  "36days": 36
};

function formatMoney(a){
  return Number(a).toLocaleString()+" UGX";
}

function getRemaining(end){
  let diff = end - Date.now();
  if(diff <= 0) return "Completed";

  let d=Math.floor(diff/86400000);
  let h=Math.floor((diff%86400000)/3600000);
  let m=Math.floor((diff%3600000)/60000);
  let s=Math.floor((diff%60000)/1000);

  return `${d}d ${h}h ${m}m ${s}s`;
}

/* CLEAR OLD TIMERS */
function clearTimers(){
  timers.forEach(t=>clearInterval(t));
  timers=[];
}

/* CREATE CARD */
function createCard(planName, inv){

  let days = durations[planName] || 0;
  let end = inv.startTime + (days * 86400000);
  let done = Date.now() >= end;

  let div = document.createElement("div");
  div.className="card";

  let id = "cd-" + Math.random().toString(36).slice(2);

  div.innerHTML=`
    <div class="header">
      <div class="plan">${planName.replace("days"," Days").replace("hrs"," Hours")}</div>
      <div class="status ${done?'completed':'active'}">
        ${done?'Completed':'Active'}
      </div>
    </div>

    <div class="details">
      Amount: ${formatMoney(inv.amount)}
    </div>

    <div class="countdown" id="${id}">
      ${done ? "Completed" : getRemaining(end)}
    </div>
  `;

  if(!done){
    let interval = setInterval(()=>{
      let el=document.getElementById(id);
      if(el){
        let txt = getRemaining(end);
        el.innerText = txt;

        if(txt === "Completed"){
          clearInterval(interval);
          location.reload();
        }
      }
    },1000);

    timers.push(interval);
  }

  return {div, done};
}

/* RENDER */
function render(allData){

  clearTimers(); // 🔥 prevent duplicate timers
  container.innerHTML="";

  let activeSection=document.createElement("div");
  let completedSection=document.createElement("div");

  activeSection.innerHTML='<div class="section-title">Ongoing Investments</div>';
  completedSection.innerHTML='<div class="section-title">Completed Investments</div>';

  let hasActive=false, hasCompleted=false;

  Object.keys(allData).forEach(planName=>{
    let planData = allData[planName];

    Object.values(planData).forEach(inv=>{
      let {div, done} = createCard(planName, inv);

      if(done){
        completedSection.appendChild(div);
        hasCompleted=true;
      }else{
        activeSection.appendChild(div);
        hasActive=true;
      }
    });
  });

  if(hasActive) container.appendChild(activeSection);
  if(hasCompleted) container.appendChild(completedSection);

  if(!hasActive && !hasCompleted){
    container.innerHTML='<div class="empty">No investments found</div>';
  }
}

/* REALTIME SYNC */
onAuthStateChanged(auth,user=>{
  if(!user){
    window.location.href="login.html";
    return;
  }

  const userRef = ref(db,"investments/"+user.uid);

  if(unsubscribe) off(userRef); // 🔥 prevent duplicate listener

  unsubscribe = onValue(userRef,(snap)=>{
    let data = snap.val() || {};
    render(data);
  });
});
</script>

</body>
</html>
